name: Make Package Public

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  make-public:
    runs-on: ubuntu-latest
    steps:
      - name: Make package public
        run: |
          # List org packages to find ours
          echo "Checking package..."
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/whiteowl-engine/packages/npm/whiteowl" | jq '{name: .name, visibility: .visibility}'

          # Try to update visibility
          echo "Setting visibility to public..."
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"visibility":"public"}' \
            "https://api.github.com/orgs/whiteowl-engine/packages/npm/whiteowl" | jq '{name: .name, visibility: .visibility}'
