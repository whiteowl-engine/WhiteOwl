name: smart-money-follow
description: Follow trades from tracked smart money wallets with conservative sizing

entry:
  conditions:
    - score >= 65
    - holders >= 20
    - bondingCurveProgress >= 10
    - marketCap >= 10000
    - marketCap < 500000
  buy:
    amount_sol: 0.15
    slippage_bps: 1500
    priority_fee_sol: 0.005

exit:
  take_profit:
    - at: 1.5
      sell_percent: 30
    - at: 2.5
      sell_percent: 40
    - at: 5.0
      sell_percent: 100
  stop_loss_percent: 35
  timeout_minutes: 120
  timeout_action: sell

filters:
  min_score: 65
  blacklist_patterns:
    - "test"
    - "fake"
    - "scam"
