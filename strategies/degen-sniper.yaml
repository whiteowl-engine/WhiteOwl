name: degen-sniper
description: Aggressive early entry on new pump.fun launches with fast exit targets

entry:
  conditions:
    - bondingCurveProgress < 15
    - holders >= 5
    - holders < 50
    - marketCap < 30000
    - price > 0
  buy:
    amount_sol: 0.1
    slippage_bps: 2000
    priority_fee_sol: 0.01

exit:
  take_profit:
    - at: 2.0
      sell_percent: 50
    - at: 3.0
      sell_percent: 30
    - at: 5.0
      sell_percent: 100
  stop_loss_percent: 50
  timeout_minutes: 30
  timeout_action: sell

filters:
  blacklist_patterns:
    - "test"
    - "rug"
    - "scam"
    - "airdrop"
  min_score: 50
